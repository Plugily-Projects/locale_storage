###############################[IMPORTANT]###############################
# You can translate TheBridge messages here.
# Color codes (&) supported.
# 
# Use \n to make new line
# Some messages like item
# descriptions don't support new lines
# they are wrapped every 40 characters automatically
# 
# Some messages support their own placeholders
# like %player%, %kit% etc.
# 
# Color scheme
Color:
  Placeholder:
    Value: "&e"
    Number: "&e"
    Player: "&b"
    Other: "&e"
  Chat:
    Issue: "&c"
    Messages: "&7"
    Special-Char:
      Contains: "[,],(,),{,},■,/,|,▸"
      Before: "&8"
# Command messages
Commands:
  Did-You-Mean: "%plugin_prefix% querias decir /%value%?"
  Command-Executed: "%plugin_prefix% Comando ejecutado exitosamente!"
  Teleported-To-Lobby: "%plugin_prefix% Teletransportado a la lobby!"
  Removed-Game-Instance: "%color_chat_issue%%plugin_prefix% Instancia removida exitosamente!"
  No-Arena-Like-That: "%color_chat_issue%%plugin_prefix% No Hay arenas con ese  ID!"
  Look-At-Sign: "%color_chat_issue%%plugin_prefix% Tienes que mirar un cartel!"
  Type-Arena-Name: "%color_chat_issue%%plugin_prefix% Por favor escriba el ID!"
  Hold-Any-Item: "%color_chat_issue%%plugin_prefix% Tienes que sostener un item!"
  No-Free-Arenas: "%color_chat_issue%%plugin_prefix% No hay arenas libres!"
  Only-By-Player: "%color_chat_issue%%plugin_prefix% You can execute this command only as player!"
  Not-Playing: "%color_chat_issue%%plugin_prefix% Debes estar jugando para ejecutar este comando!"
  No-Permission: "%color_chat_issue%%plugin_prefix% No tienes permisos para usar este comando!"
  Player-Not-Found: "%color_chat_issue%%plugin_prefix% Jugador  %player% no existe !"
  Invalid-Location-Teleport: "%color_chat_issue%%plugin_prefix% Ubicación inválida!"
  Wrong-Usage: "%color_chat_issue%%plugin_prefix% mal uso . haz  %value%"
  Admin:
    Adjust-Statistic: "%plugin_prefix% Stats %value% de %player% ahora es %number%!"
    Reload-Success: "%plugin_prefix% Arenas Recargadas!"
    List:
      Header: "%plugin_name% arenas: nombre estado jugadores"
      Format: "%arena_name% %arena_state_placeholder% %arena_players_size%/%arena_max_players%"
      No-Arenas: "%color_chat_issue%%plugin_prefix% no hay instancias de juego!"
    Spychat:
      Toggled: "%plugin_prefix% Soy chat de juego cambiado a %value%"
  Main:
    Header: "&6----------------{%plugin_name% comandos}----------"
    Description:
      - "&aComandos de juego:"
      - "&b/%plugin_short_command% stats: Muestra tus stats!"
      - "&b/%plugin_short_command% leave: Salir de la arena actual !"
      - "&b/%plugin_short_command% join <arena>: Únete a una arena específica !"
      - "&b/%plugin_short_command% top <statistic>: muestra a los top 10!"
      - "&b/%plugin_short_command% selectkit: Selecciona tu kit!"
      - "&b/%plugin_short_command% selectbase: Seleciona tu base dentro del juego!"
      - "&b/%plugin_short_command% randomjoin: Únete a una arena random!"
    Admin-Bonus-Description: "&b/%plugin_short_command%: Muestra los comandos de administrador"
    Footer: "&6-------------------------------------------------"
# In-Game scoreboard messages
# 
# Please do not use more chars than the scoreboard can handle!
# Scoreboard supports up to 122 chars for 1.14+ and 48 chars for 1.13- (COLOR CODES INCLUDED.)
# Placeholders:
# https://wiki.plugily.xyz/minigame/placeholders/
Scoreboard:
  Title: "&a&l%plugin_name%"
  Bases:
    # Alternative format with numbers instead of symbols would be %scoreboard_base_color_formatted% (%scoreboard_base_players_size%) &e%scoreboard_base_yourself% %scoreboard_base_points%
    Format: "%scoreboard_base_color_formatted% (%scoreboard_base_players_size%) &e%scoreboard_base_yourself% %scoreboard_base_points_formatted%"
    Not-Inside: "--"
    Inside: "(tu)"
  Mode:
    POINTS:
      Got: "&a●"
      Missing: "&7●"
    HEARTS:
      Got: "&c♥"
      Missing: "&7♥"
  Content:
    Waiting:
      - " "
      - "■ Jugadores | %arena_players_size%"
      - " "
      - "■ Jugadores minimos | %arena_min_players%"
      - " "
      - "   &k www.plugily.xyz"
    Starting:
      - " "
      - "■ Comenzando en| %arena_time%"
      - " "
      - "■ Jugadores | %arena_players_size%"
      - " "
      - "■ Jugadores minimos | %arena_min_players%"
      - " "
      - "   &k www.plugily.xyz"
    # Contents of scoreboard while ingame
    In-Game:
      - "&f"
      - "■ Tiempo | &e%arena_time_formatted%"
      - "■ Bases | "
      - "■ %scoreboard_bases_list%"
      - " "
      - "■ Kills | &e%user_statistic_local_kills%"
      - "■ Muertes | &e%user_statistic_local_deaths%"
      - "■ Puntaje | &e%user_statistic_local_scored_points%"
      - " "
      - "■ Modo | &e%arena_option_mode%"
      - "■ Reinicio de bloques en  %arena_option_reset_blocks_in% rounds"
      - "&f"
      - " "
      - "   &k www.plugily.xyz"
    # Contents of scoreboard while state is ending
    Ending:
      - "&f"
      - "&f"
      - "&cJUEGO FINALIZADO"
      - " "
      - "&f"
      - "&f"
      - " "
      - "   &k www.plugily.xyz"
    # Contents of scoreboard while state is restarting
    Restarting:
      - "&f"
      - "&f"
      - "&cREINICIANDO JUEGO"
      - " "
      - "&f"
      - "&f"
      - " "
      - "   &k www.plugily.xyz"
# Bossbar messages
# 
# Bossbar needs to be enabled on config.yml
Bossbar:
  Title: "%plugin_name% - &k www.plugily.xyz"
  Content:
    Waiting:
      - "Esperando por más jugadores..."
    Starting:
      - "Comenzando en: %arena_time%"
    In-Game:
      - "Jugando %plugin_name_uppercase% en vanguard"
      - "creador del plugin PLUGILY.XYZ"
      - "Puntaje obtenido %user_statistic_local_scored_points%"
      - "Tu base %arena_base_color_formatted%"
    Ending:
      - " Juego finalizado!"
    Restarting:
      - "Reiniciando arena. Seras transportado pronto!"
# In-Game Messages
In-Game:
  # Used in most game messages.
  Plugin-Prefix: "(%plugin_name%)"
  Game-Chat-Format: "[%user_statistic_level%][%kit%] %player% | %message%"
  You-Leveled-Up: "%plugin_prefix% Subiste de nivel, ahora eres nivel  %number%!"
  Commands-Blocked: "%color_chat_issue%%plugin_prefix% Primero tienes que salirte del juego para usar comandos. El unico comando disponible es /%plugin_short_command% leave!"
  Join:
    Already-Playing: "%color_chat_issue%%plugin_prefix% Ya estas en cola para jugar ! Puedes salirte con /%plugin_short_command% leave."
    No-Permission: "%color_chat_issue%%plugin_prefix% No tienes %value% permiso para unirte a esta arena!"
    Full-Game: "%color_chat_issue%%plugin_prefix% You don't have the permission to join full games!"
    No-Slots-For-Premium: "%color_chat_issue%%plugin_prefix% This game is already full of premium players! Sorry"
    # Join cancelled via external plugin that uses the API of our plugin.
    Cancelled-Via-API: "%color_chat_issue%%plugin_prefix% No puedes unirte a este juego!"
    As-Party-Member: "%color_chat_issue%%plugin_prefix% te uniste a la %arena_name% porque el lider se unio!"
    Arena-Not-Configured: "%color_chat_issue%%plugin_prefix% Arena is not configured yet! Contact your server's staff!"
    Title: "20,30,20;%arena_name%;%arena_players_size%/%arena_max_players%"
  Death:
    Tag: "&8Muerto"
    Screen: "%color_chat_issue%Moriste!"
  Spectator:
    Blocked: "%color_chat_issue%%plugin_prefix% Spectators are disabled for this arena"
    You-Are-Spectator: "%plugin_prefix% Eres espectador! Puedes volar!"
    Spectator-Menu-Name: "%color_chat_issue%Alive players list"
    Target-Player-Health: "%color_chat_issue%Health: %number%"
    Spectator-Warning: "%plugin_prefix% Eres espectador!"
    Teleport: "%plugin_prefix% Teletransportado a %player%"
    Menu:
      Settings:
        Status:
          Enabled: "Enabled"
          Disabled: "Disabled"
        Changed-Speed: "Changed Speed to %number%"
        Auto-Teleport: "%value% auto teleport"
        Target-Player:
          Action-Bar: "%number% blocks away | Target %player%"
        Night-Vision: "%value% night vision"
        First-Person-Mode:
          Action-Bar: "&eSNEAK &cto leave! | Target %player%"
          Title: "&eSNEAK &cto leave!"
        Visibility: "%value% other spectator players"
  Messages:
    Join: "%plugin_prefix% %player% joined the game (%arena_players_size%/%arena_max_players%)!"
    Leave: "%plugin_prefix% %player% left the game (%arena_players_size%/%arena_max_players%)!"
    Death: "%plugin_prefix% %player% Murio!"
    Lobby:
      Start-In: "%plugin_prefix% The game starts in %arena_time% seconds!"
      Waiting-For-Players: "%plugin_prefix% Esperando jugadores ... Necesitamos almenos %arena_min_players% players to start."
      Enough-Players-To-Start: "%plugin_prefix% Hay suficientes jugadores. El juego comenzara en breve!"
      Reduced-Time: "%plugin_prefix% The time got reduced to %number% seconds"
      Max-Players: "%plugin_prefix% We reached max players for this round. Let's shorten the time!"
      Game-Started: "%plugin_prefix% The game has started!"
      Kicked-For-Premium-Slot: "%color_chat_issue%%plugin_prefix% %player% got removed from the game to make a place for premium players!"
      You-Were-Kicked-For-Premium-Slot: "%color_chat_issue%%plugin_prefix% You got kicked out of the game to make a place for a premium player!"
      Not-Enough-Space-For-Party: "%color_chat_issue%%plugin_prefix% Your party is bigger than free places on the arena %arena_name%"
    Game-End:
      Summary:
        - "&a&m--------------------------------------------------"
        - "%plugin_name%"
        - " "
        - "%arena_summary%"
        - "%arena_summary_player%"
        - " "
        - " "
        - "Base members"
        - "%arena_summary_winner_base_players% (%arena_summary_base_scored%)"
        - " "
        - "&a&m--------------------------------------------------"
      Placeholders:
        Win: "&aYou won the game"
        Lose: "%color_chat_issue%You lost the game"
        Players: "&cThere are not enough players anymore. Arena got force stopped!"
        Base:
          HEARTS: "%arena_summary_winner_base% survived successfully!"
          POINTS: "%arena_summary_winner_base% got the most points!"
    Admin:
      Set-Starting-In-To-0: "%plugin_prefix% An admin set waiting time to 0. The game starts now!"
    Arena:
      Cooldown: "[%value%&8&l] &6%number% seconds"
      Death: "%plugin_prefix% %player% died by %value%!"
      Death-Own: "&b%player% &7Muerto!"
      Killed: "%plugin_prefix% &aYou killed %player%"
      Build-Break: "%color_chat_issue%%plugin_prefix% You can not build and break here"
      Time-Left: "5,20,5;%color_chat_issue%Time is running out;%arena_time% seconds left"
      Portal:
        Own: "%color_chat_issue%%plugin_prefix% That is your own portal"
        Opponent: "%plugin_prefix% %arena_base_color_formatted% %player% jumped into %value%!"
        Scored:
          Title: "5,20,5;%arena_base_color_formatted% %player%;jumped into %value%"
        Hologram: "%arena_base_color_formatted%;Jump into this portal!"
        Out: "%color_chat_issue%%plugin_prefix% This base is already out!"
      Blocked:
        Reset: "%plugin_prefix% Movement is disabled while round reset"
        Run: "%plugin_prefix% &aGO! &7Lets jump into the portals!!"
        Title: "5,20,5;Start in...;%number%"
        Start: "%plugin_prefix% Preparate para saltar en el portal rival"
      Damage: "%player%  &c♥ %value%"
