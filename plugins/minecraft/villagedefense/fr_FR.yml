# In-Game scoreboard messages
# 
# Please do not use more chars than the scoreboard can handle!
# Scoreboard supports up to 122 chars for 1.14+ and 48 chars for 1.13- (COLOR CODES INCLUDED.)
# Placeholders:
# https://wiki.plugily.xyz/villagedefense/placeholders/language
Scoreboard:
  Title: "&a&l%plugin_name%"
  Content:
    Waiting:
      - "&fJoueurs: &e%arena_players_size%"
      - " "
      - "&fJoueurs minimum: &e%arena_min_players%"
      - " "
      - "&ewww.plugily.xyz"
      - "   www.plugily.xyz"
    Starting:
      - "&fDémarrage dans: &e%arena_time%"
      - " "
      - "&fJoueurs: &e%arena_players_size%"
      - " "
      - "&fJoueurs minimum: &e%arena_min_players%"
      - " "
      - "&ewww.plugily.xyz"
      - "   www.plugily.xyz"
    # Contents of scoreboard while ingame
    In-Game:
      - "&fVillageois Restants: &e%arena_villager_size%"
      - "&fJoueurs Restants: &e%arena_players_left_size%"
      - "&fZombies Restants: &e%arena_zombie_size_left%"
      - " "
      - "&fChair Putréfiée: &e%arena_rotten_flesh_amount%"
      - "&fOrbes: &e%user_statistic_orbs%"
      - " "
      - "&ewww.plugily.xyz"
      - "   www.plugily.xyz"
    In-Game-Waiting:
      - "&fVillageois Restants: &e%arena_villager_size%"
      - "&fJoueurs Restants: &e%arena_players_left_size%"
      - "&fZombies Restants: &e%arena_zombie_size_left%"
      - " "
      - "&fProchaine Vague Dans: %arena_time%"
      - " "
      - "&fChair Putréfiée: &e%arena_rotten_flesh_amount%"
      - "&fOrbes: &e%user_statistic_orbs%"
      - " "
      - "&ewww.plugily.xyz"
    # Contents of scoreboard while state is ending
    Ending:
      - "&f"
      - "&f"
      - "&cPARTIE FINIE"
      - " "
      - "&f"
      - "&f"
      - " "
      - "&ewww.plugily.xyz"
    # Contents of scoreboard while state is restarting
    Restarting:
      - "&f"
      - "&f"
      - "&cREDÉMARRAGE DU JEU"
      - " "
      - "&f"
      - "&f"
      - " "
      - "&ewww.plugily.xyz"
# Bossbar messages
# 
# Bossbar needs to be enabled on config.yml
Bossbar:
  Title: "&a&l%plugin_name% &6- www.plugily.xyz"
  Content:
    Waiting:
      - "&4&lAttente de plus de joueurs..."
    Starting:
      - "&f&lDépart dans: &e&l%arena_time%"
    In-Game:
      - "Joue %plugin_name_uppercase% dans PLUGILY.XYZ"
      - "Découvrez le créateur du plugin sur PLUGILY.XYZ"
      - "Vague actuelle %arena_option_wave%"
    Ending:
      - "&c&lLa partie est finie! Vous jouiez sur &b&lPLUGILY.XYZ"
    Restarting:
      - "&c&lRedémarrage de l'arèna. Vous allez bientôt être déplacé!"
