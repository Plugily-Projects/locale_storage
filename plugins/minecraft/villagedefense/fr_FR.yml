  No-Arena-Like-That: "%color_chat_issue%%plugin_prefix% Pas d'arène avec cet identifiant !"
  Look-At-Sign: "%color_chat_issue%%plugin_prefix% Vous devez regarder un panneau pour exécuter cette commande !"
  Type-Arena-Name: "%color_chat_issue%%plugin_prefix% Veuillez saisir l'identifiant d'une arène !"
