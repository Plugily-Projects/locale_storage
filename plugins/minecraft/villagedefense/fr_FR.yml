# Command messages
Commands:
  Did-You-Mean: "%plugin_prefix% Voulez-vous dire /%value%?"
  Command-Executed: "%plugin_prefix% La commande, c'est bien exécuté !"
  Teleported-To-Lobby: "%plugin_prefix% Téléportation au lobby!"
