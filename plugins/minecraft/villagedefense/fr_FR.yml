  No-Permission: "&cVous n'avez pas la permission d'exécuter cette commande !"
  Player-Not-Found: "&cLe joueur %player% n'existe pas !"
  Invalid-Location-Teleport: "&cL'emplacement de téléportation n'est pas valide !"
  Wrong-Usage: "&cMauvaise utilisation. Faites %value%"
  Admin:
    Added-Orbs: "&7Ajout d'orbes au joueur !"
    Received-Orbs: "&7Vous recevez &a%number% orbes&7!"
    Added-Level: "&7Le niveau a été ajouté au joueur!"
    Reload-Success: "&aArènes rechargées"
