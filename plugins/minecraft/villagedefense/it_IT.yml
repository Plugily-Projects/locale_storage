        Visibility: "%value% la visibilità degli altri spettatori"
    Blocked: "%color_chat_issue%%plugin_prefix% Non sono ammessi spettatori in questa partita"
  Messages:
    Join: "%plugin_prefix% %player% è entrato in partita (%arena_players_size%/%arena_max_players%)!"
    Leave: "%plugin_prefix% %player% è uscito dalla partita (%arena_players_size%/%arena_max_players%)!"
    Death: "%plugin_prefix% %player% è morto!"
    Lobby:
      Start-In: "%plugin_prefix% Il gioco inizierà in %arena_time% secondi!"
      Waiting-For-Players: "%plugin_prefix% In attesa di giocatori... Sono necessari almeno %arena_min_players% giocatori per poter iniziare."
      Enough-Players-To-Start: "%plugin_prefix% Ci sono ora abbastanza giocatori. La partita inizierà presto!"
      Game-Started: "%plugin_prefix% Il gioco è inizito!"
