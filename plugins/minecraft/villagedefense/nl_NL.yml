# In-Game scoreboard messages
# 
# Please do not use more chars than the scoreboard can handle!
# Scoreboard supports up to 122 chars for 1.14+ and 48 chars for 1.13- (COLOR CODES INCLUDED.)
# Placeholders:
# https://wiki.plugily.xyz/villagedefense/placeholders/language
Scoreboard:
  Title: "&a&l%plugin_name%"
  Content:
    Waiting:
      - "&fSpelers: &e%arena_players_size%"
      - " "
      - "&fMinimaal aantal Spelers: &e%arena_min_players%"
      - " "
      - "&ewww.plugily.xyz"
      - "   www.plugily.xyz"
    Starting:
      - "&fBegint In: &e%arena_time%"
      - " "
      - "&fSpelers: &e%arena_players_size%"
      - " "
      - "&fMinimaal aantal spelers: &e%arena_min_players%"
      - " "
      - "&ewww.plugily.xyz"
      - "   www.plugily.xyz"
    # Contents of scoreboard while ingame
    In-Game:
      - "&fVillagers Over: &e%arena_villager_size%"
      - "&fSpelers Verlaten: &e%arena_players_left_size%"
      - "&fZombies Verlaten: &e%arena_zombie_size_left%"
      - " "
      - "&fVerrot vlees: &e%arena_rotten_flesh_amount%"
      - "&fLichtbollen: &e%user_statistic_orbs%"
      - " "
      - "&ewww.plugily.xyz"
      - "   www.plugily.xyz"
    In-Game-Waiting:
      - "&fVillagers Over: &e%arena_villager_size%"
      - "&fSpelers Over: &e%arena_players_left_size%"
      - "&fZombies Over: &e%arena_zombie_size_left%"
      - " "
      - "&fVolgende golf over: %arena_time%"
      - " "
      - "&fVerrot vlees: &e%arena_rotten_flesh_amount%"
      - "&fLichtbollen: &e%user_statistic_orbs%"
      - " "
      - "&ewww.plugily.xyz"
    # Contents of scoreboard while state is ending
    Ending:
      - "&f"
      - "&f"
      - "&cSPEL IS AFGELOPEN"
      - " "
      - "&f"
      - "&f"
      - " "
      - "&ewww.plugily.xyz"
    # Contents of scoreboard while state is restarting
    Restarting:
      - "&f"
      - "&f"
      - "&cSPEL WORDT HERSTART"
      - " "
      - "&f"
      - "&f"
      - " "
      - "&ewww.plugily.xyz"
# Bossbar messages
# 
# Bossbar needs to be enabled on config.yml
Bossbar:
  Title: "&a&l%plugin_name% &6- www.plugily.xyz"
  Content:
    Waiting:
      - "&4&lWachtend op meer spelers..."
    Starting:
      - "&f&lBegint in: &e&l%arena_time%"
    In-Game:
      - "&e&lSpeel &f&l%plugin_name_uppercase% &e&lop &b&lPLUGILY.XYZ"
      - "&e&lCheck de plugin maker &e&lop &b&lPLUGILY.XYZ"
      - "Huidige golf%arena_option_wave%"
    Ending:
      - "&c&lSpel is afgelopen! Je speelde op &b&lPLUGILY.XYZ"
    Restarting:
      - "&c&lDe arena wordt herstart. Je wordt snel verplaatst!"
