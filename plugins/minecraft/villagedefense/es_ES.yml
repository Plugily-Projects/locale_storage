    Footer: "&6-------------------------------------------------"
# In-Game scoreboard messages
# 
# Please do not use more chars than the scoreboard can handle!
# Scoreboard supports up to 122 chars for 1.14+ and 48 chars for 1.13- (COLOR CODES INCLUDED.)
# Placeholders:
# https://wiki.plugily.xyz/villagedefense/placeholders/language
Scoreboard:
  Title: "&a&l%plugin_name%"
  Content:
    Waiting:
      - "&fJugadores; &e%arena_players_size%\n"
      - "■ Jugadores| %arena_players_size%\n"
      - "&fJugadores necesarios: &e%arena_min_players%"
      - "■ Jugadores necesarios: &e%arena_min_players%"
      - "&3&lManco&5&lStudios"
      - "&3&lManco&5&lStudios"
    Starting:
      - "&fEmpezando en: &e%arena_time%\n"
      - "■ Empezando en: | %arena_time%\n"
      - "&fJugadores: &e%arena_players_size%"
      - "■ Jugadores| %arena_players_size%"
      - "&fJugadores necesarios: &e%arena_min_players%"
      - "■  Jugadores necesarios: &e%arena_min_players%"
      - "&3&lManco&5&lStudios"
      - "&3&lManco&5&lStudios"
    # Contents of scoreboard while ingame
    In-Game:
      - "&fAldeanos restantes: &e%arena_villager_size%"
      - "■Aldeanos: %arena_villager_size%"
      - "■&fJugadores restantes: &e%arena_zombie_size_left%"
      - "■ Zombies | %arena_zombie_size_left%"
      - "&fCarne podrida: &e%arena_rotten_flesh_amount%"
      - "■Carne podrida: &e%arena_rotten_flesh_amount%"
      - "■Orbes | %user_statistic_orbs% "
      - "&3&lManco&5&lStudios"
      - "&3&lManco&5&lStudios"
    In-Game-Waiting:
      - "&fAldeanos restantes: &e%arena_villager_size%"
      - "■ Aldeanos | %arena_villager_size%"
      - "■ Jugadores | %arena_players_left_size%"
      - " "
      - "&fSiguiente oleada en: %arena_time%"
      - " "
      - "■ Carne podrida: &e%arena_rotten_flesh_amount%"
      - "&fOrbes: &e%user_statistic_orbs%"
      - " "
      - "&3&lManco&5&lStudios"
    # Contents of scoreboard while state is ending
    Ending:
      - "&f"
      - "&f"
      - "&cPARTIDA FINALIZADA"
      - " "
      - "&f"
      - "&f"
      - " "
      - "&3&lManco&5&lStudios"
    # Contents of scoreboard while state is restarting
    Restarting:
      - "&f"
      - "&f"
      - "&cREINICIANDO PARTIDA"
      - " "
      - "&f"
      - "&f"
      - " "
      - "&3&lManco&5&lStudios"
