  No-Permission: "%color_chat_issue%%plugin_prefix% no tienes permiso para usar este comadno"
  Player-Not-Found: "%color_chat_issue%%plugin_prefix% El jugador %player% no existe!"
  Invalid-Location-Teleport: "%color_chat_issue%%plugin_prefix% Locacion de teletransporte no valida!"
  Wrong-Usage: "%color_chat_issue%%plugin_prefix% mal uso. Usa: %value%"
  Admin:
    Added-Orbs: "Se añadio orbes al jugador!"
    Received-Orbs: "Haz recibido %number% orbes!"
    Added-Level: "&7Se añadio un nivel al jugador!"
    Reload-Success: "Arenas recargadas!"
    List:
      Header: "arenas: nombre estado jugadores"
      Format: "&a%arena_name% &e%arena_state_placeholder% &6%arena_players_size%/%arena_max_players%"
