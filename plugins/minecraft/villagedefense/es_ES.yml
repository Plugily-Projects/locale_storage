# Command messages
Commands:
  Did-You-Mean: "%plugin_prefix% Quisiste decir /%value%?"
  Command-Executed: "%plugin_prefix% ¡Comando ejecutado con éxito!"
  Teleported-To-Lobby: "%plugin_prefix%¡Teletransportado al lobby!"
  Removed-Game-Instance: "%color_chat_issue%%plugin_prefix% Se a removido con éxito la instancia de juego."
  No-Arena-Like-That: "%color_chat_issue%%plugin_prefix% sin arena con ese ID"
