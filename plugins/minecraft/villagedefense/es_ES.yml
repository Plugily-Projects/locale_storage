  Type-Arena-Name: "%color_chat_issue%%plugin_prefix% Por favor escribe el ID de la arena!"
  Hold-Any-Item: "%color_chat_issue%%plugin_prefix% Debes sostener cualquier objeto!"
  No-Free-Arenas: "%color_chat_issue%%plugin_prefix% No hay arenas libres!"
